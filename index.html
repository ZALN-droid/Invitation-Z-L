<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#book-container{
    position:relative;
}

#flipbook{
    height:95vh;
    width:min(calc(95vh * 0.707),95vw);
}

.page{
    background:white;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* Invisible tap corners */

.corner{
    position:absolute;
    width:90px;
    height:90px;
    z-index:999;
    cursor:pointer;
}

#next{
    right:0;
    bottom:0;
}

#prev{
    left:0;
    bottom:0;
}

/* Optional visual hint */

.corner::after{
    content:"";
    position:absolute;
    width:30px;
    height:30px;
    border-bottom:2px solid rgba(0,0,0,0.15);
}

#next::after{
    right:15px;
    bottom:15px;
    border-right:2px solid rgba(0,0,0,0.15);
}

#prev::after{
    left:15px;
    bottom:15px;
    border-left:2px solid rgba(0,0,0,0.15);
}
</style>
</head>
<body>

<div id="book-container">

    <div id="flipbook">

        <div class="page"><img src="image1.jpg"></div>
        <div class="page"><img src="image2.jpg"></div>
        <div class="page"><img src="image3.jpg"></div>
        <div class="page"><img src="image4.jpg"></div>
        <div class="page"><img src="image5.jpg"></div>

    </div>

    <div id="prev" class="corner"></div>
    <div id="next" class="corner"></div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<script>

function initBook(){

    if($("#flipbook").data("turn")){
        $("#flipbook").turn("destroy");
    }

    $("#flipbook").turn({
        width: $("#flipbook").width(),
        height: $("#flipbook").height(),
        display: "single",
        autoCenter: true,
        gradients: true,
        acceleration: true
    });
}

$(document).ready(function(){

    initBook();

    $("#next").on("click", function(){
        $("#flipbook").turn("next");
    });

    $("#prev").on("click", function(){
        $("#flipbook").turn("previous");
    });

    $(window).on("resize", function(){
        initBook();
    });

});
</script>

</body>
</html>
