<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invite</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100dvh;
    overflow:hidden;
    background:#f5f5f5;
}

/* PAGE SYSTEM */
.page{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
}

.page.active{
    display:block;
}

/* IMAGE */
.page img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* HOTSPOTS */
.hotspot{
    position:absolute;
    display:block;
    z-index:10;
}

/* optional visual debug (remove later if needed)
.hotspot{
    background:rgba(255,0,0,0.2);
}
*/
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active">
    <img src="image1.png">
</div>

<!-- PAGE 2 -->
<div class="page">

    <img src="image2.png">

    <a class="hotspot"
       href="https://YOUR-LOCATION-LINK"
       target="_blank"
       style="top:58%; left:20%; width:60%; height:10%;">
    </a>

</div>

<!-- PAGE 3 -->
<div class="page">

    <img src="image3.png">

    <a class="hotspot"
       href="https://YOUR-LOCATION-LINK"
       target="_blank"
       style="top:52%; left:20%; width:60%; height:10%;">
    </a>

    <a class="hotspot"
       href="https://YOUR-RSVP-LINK"
       target="_blank"
       style="top:68%; left:20%; width:60%; height:10%;">
    </a>

</div>

<!-- PAGE 4 -->
<div class="page">
    <img src="image4.png">
</div>

<!-- PAGE 5 -->
<div class="page">

    <img src="image5.png">

    <a class="hotspot"
       href="https://YOUR-DETAILS-LINK"
       target="_blank"
       style="top:60%; left:20%; width:60%; height:15%;">
    </a>

</div>

<script>
let pages = document.querySelectorAll(".page");
let current = 0;

function showPage(i){
    pages.forEach(p => p.classList.remove("active"));
    pages[i].classList.add("active");
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(endX < startX - 50){
        if(current < pages.length - 1){
            current++;
            showPage(current);
        }
    }

    if(endX > startX + 50){
        if(current > 0){
            current--;
            showPage(current);
        }
    }
});

/* CORNER NAVIGATION ONLY */
document.addEventListener("click", function(e){

    let x = e.clientX;
    let y = e.clientY;

    let w = window.innerWidth;
    let h = window.innerHeight;

    let cornerW = w * 0.25;
    let cornerH = h * 0.25;

    let isRightCorner =
        x > w - cornerW &&
        y > h - cornerH;

    let isLeftCorner =
        x < cornerW &&
        y > h - cornerH;

    // NEXT
    if(isRightCorner){
        if(current < pages.length - 1){
            current++;
            showPage(current);
        }
    }

    // PREVIOUS
    if(isLeftCorner){
        if(current > 0){
            current--;
            showPage(current);
        }
    }

});
</script>

</body>
</html>
