<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Full screen usable height (mobile safe) */
body{
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    overflow:hidden;
}

/* prevents overlap with mobile bottom bar */
#flipbook{
    height:92dvh;
    width:min(calc(92dvh * 0.707), 100vw);
}

/* Pages */
.page{
    background:#fff;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}
.page{
    position:relative;
}

.page-wrap{
    position:relative;
    width:100%;
    height:100%;
}
/* Turn.js pages */
.turn-page{
    background:#fff !important;
}
.link-text{
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-family:"Garamond","Georgia","Times New Roman",serif;
    font-size:16px;
    color:#2b2b2b;
    background:rgba(255,255,255,0.6);
    padding:8px 12px;
    border-radius:8px;
}
/* Tap zones (optional but useful) */
.tap{
    position:absolute;
    top:0;
    width:50%;
    height:100%;
    z-index:10;
}
#prev{ left:0; }
#next{ right:0; }
</style>
</head>

<body>

<div style="position:relative">

<div id="flipbook">

    <div class="page"><img src="image1.png"></div>
    <div class="page">
    <div class="page-wrap">

        <img src="image2.png" style="width:100%;height:100%;object-fit:contain;">

        <a href="https://your-location-link.com"
           target="_blank"
           class="link-text"
           style="top:62%;left:25%;width:50%;height:12%;">
            Tap to view location
        </a>

    </div>
</div>
    <div class="page"><img src="image3.png"></div>
    <div class="page"><img src="image4.png"></div>
    <div class="page"><img src="image5.png"></div>

</div>

<div id="prev" class="tap"></div>
<div id="next" class="tap"></div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<script>
function init(){
    if($("#flipbook").data("turn")){
        $("#flipbook").turn("destroy");
    }

    $("#flipbook").turn({
        width: $("#flipbook").width(),
        height: $("#flipbook").height(),
        display: "single",
        autoCenter: true,
        gradients: true,
        acceleration: true
    });
}

$(document).ready(function(){

    init();

    $("#next").click(()=>$("#flipbook").turn("next"));
    $("#prev").click(()=>$("#flipbook").turn("previous"));

    $(window).on("resize", init);

});
</script>

</body>
</html>
