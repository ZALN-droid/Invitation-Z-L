<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    overflow:hidden;
}

/* Flipbook container */
#flipbook{
    height:95vh;
    width:min(calc(95vh * 0.707), 95vw);
}

/* Remove white page background */
.page{
    background:transparent !important;
}

/* Image fitting */
.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* Turn.js pages (important fix) */
.turn-page{
    background:transparent !important;
}
</style>
</head>
<body>

<div id="book-container">

    <div id="flipbook">

        <div class="page">
    <img src="https://placehold.co/800x1200/png"></div>
        <div class="page"><img src="image1.png"></div>
        <div class="page"><img src="image2.png"></div>
        <div class="page"><img src="image3.png"></div>
        <div class="page"><img src="image4.png"></div>
        <div class="page"><img src="image5.png"></div>

    </div>

    <div id="prev" class="corner"></div>
    <div id="next" class="corner"></div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<script>

function initBook(){

    if($("#flipbook").data("turn")){
        $("#flipbook").turn("destroy");
    }

    $("#flipbook").turn({
        width: $("#flipbook").width(),
        height: $("#flipbook").height(),
        display: "single",
        autoCenter: true,
        gradients: true,
        acceleration: true
    });
}

$(document).ready(function(){

    initBook();

    $("#next").on("click", function(){
        $("#flipbook").turn("next");
    });

    $("#prev").on("click", function(){
        $("#flipbook").turn("previous");
    });

    $(window).on("resize", function(){
        initBook();
    });

});
</script>

</body>
</html>
