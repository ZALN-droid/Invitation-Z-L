<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>

/* ===== PAGE ===== */

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    position: relative;
    background: white;
}
/* ==== PGAE 1 ==== */

#page1 {
    position: absolute;
    inset: 0;

    background-image: url("image1.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: none;
}

/* ===== ENVELOPE HALVES ===== */

.panel {
    position:absolute;
    top:0;
    width:50vw;
    height:100vh;
    background:#91AC97;
    border:3px solid #C4AE40;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    transition:transform 1.4s ease-in-out;
}

.left{
    left:0;
    transform-origin:left center;
    border-right:none;
    z-index:1;
}

.right{
    right:0;
    transform-origin:right center;
    border-left:none;
    z-index:1;
}

/* ===== WAX SEAL ===== */

.seal {
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    background:white;
    color:#C4AE40;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-weight:bold;
    font-size:16px;
    line-height:1.3;
    border:3px solid #C4AE40;
    box-shadow:0 6px 15px rgba(0,0,0,.2);
    cursor:pointer;
    z-index:10;
}

/* ===== TAP TEXT ===== */

.tap-text {
    position: absolute;
    top: calc(50% + 100px);
    left: 50%;
    transform: translateX(-50%);
    font-family: Garamond, serif;
    font-size: 22px;
    color: black;
    letter-spacing: 1px;
    z-index: 10;
    transition: opacity 0.4s ease;
}

/* ===== OPEN ANIMATION ===== */

.open .left {
    transform: translateX(-100%);
}

.open .right {
    transform: translateX(100%);
}

.open .seal,
.open .tap-text {
    opacity: 0;
}

</style>
</head>

<body>

<div id="page1"></div>

<!-- LEFT HALF -->
<div class="panel left"></div>

<!-- RIGHT HALF -->
<div class="panel right"></div>

<!-- WAX SEAL -->
<img
    src="seal.png"
    alt="Wax Seal"
    class="seal"
    onclick="openEnvelope()"
>

<!-- TEXT -->
<div class="tap-text">
    TAP TO OPEN
</div>

<script>

function openEnvelope() {

    document.body.classList.add("open");

    setTimeout(function () {

    document.querySelector(".left").style.display = "none";
    document.querySelector(".right").style.display = "none";
    document.querySelector(".seal").style.display = "none";
    document.querySelector(".tap-text").style.display = "none";

    document.getElementById("page1").style.display = "block";

}, 1400);

}

</script>

</body>
</html>
